<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoyageAI | Login / Register</title>

    <link rel="stylesheet" href="../css/login.css">
</head>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<body>

    <div class="cont">

        <!-- Mobile Navigation -->
        <button class="mobile-btn mobile-login-btn">← Login</button>
        <button class="mobile-btn mobile-register-btn">Register →</button>

        <div class="forms">

            <!-- Register Form -->
            <form id="registerForm" class="register">

                <h1>Create Account</h1>

                <input
                    type="text"
                    id="registerName"
                    placeholder="Full Name"
                    required>

                <input
                    type="email"
                    id="registerEmail"
                    placeholder="Email Address"
                    required>

                <input
                    type="password"
                    id="registerPassword"
                    placeholder="Password"
                    required>

                <input
                    type="password"
                    id="confirmPassword"
                    placeholder="Confirm Password"
                    required>

                <input
                    type="submit"
                    value="Create Account"
                    id="registerBtn">

            </form>

            <!-- Login Form -->
            <form id="loginForm" class="login">

                <h1>Welcome Back</h1>

                <input
                    type="email"
                    id="loginEmail"
                    placeholder="Email Address"
                    required>

                <input
                    type="password"
                    id="loginPassword"
                    placeholder="Password"
                    required>

                <input
                    type="submit"
                    value="Login"
                    id="loginBtn">

                <!-- Google Login -->
                <div class="google-login">

                    <button
                        type="button"
                        id="googleLoginBtn">

                        <img
                            src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
                            width="20"
                            alt="Google">

                        Continue with Google

                    </button>

                </div>

                <div class="forgot-password">

                    <a href="#" id="forgotPassword">
                        Forgot Password?
                    </a>

                </div>

            </form>

            <!-- Desktop Sliding Panel -->
            <div id="shade">

                <div id="login_text">

                    <p class="big">Welcome Back!</p>

                    <p class="small">
                        Register to continue your journey.
                    </p>

                    <button type="button" class="log">
                        Login
                    </button>

                </div>

                <div id="sign_text">

                    <p class="big">Explore the World!</p>

                    <p class="small">
                        Create your VoyageAI account.
                    </p>

                    <button type="button" class="sign">
                        Register
                    </button>

                </div>

            </div>

        </div>

    </div>

    <!-- Firebase Authentication -->
    <script type="module" src="../js/auth.js"></script>

</body>

</html>
